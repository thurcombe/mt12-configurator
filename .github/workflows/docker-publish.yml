name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: thurcombe/mt12-configurator

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag points to a commit on main
        if: startsWith(github.ref, 'refs/tags/')
        run: git merge-base --is-ancestor ${{ github.sha }} origin/main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev-${{ github.run_id }},enable=${{ github.ref_type != 'tag' && github.ref_name != 'main' && github.event_name != 'schedule' && github.event_name != 'pull_request' }}
            type=ref,event=branch,enable=${{ github.ref_name == 'main' && github.event_name != 'schedule' }}
            type=semver,pattern={{version}},enable=${{ github.event_name != 'schedule' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name != 'schedule' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Deploy to production
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "$SSH_KEY" > /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            deployer@pzserver.micasa.systems \
            "${{ github.ref_name }}"
          rm -f /tmp/deploy_key
